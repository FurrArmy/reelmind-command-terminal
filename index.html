<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reelmind Corp | FurrArmy Command Terminal</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
margin:0;
padding:0;
overflow:hidden;
background:black;
color:#00ffcc;
}

.background{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#02111b,#000);
animation:pulse 6s infinite;
}

@keyframes pulse{
0%{filter:brightness(1);}
50%{filter:brightness(1.3);}
100%{filter:brightness(1);}
}

/* LOGIN */

.login-panel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(20,20,30,0.85);
padding:40px;
border-radius:12px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px cyan;
text-align:center;
}

.login-panel input{
display:block;
margin:10px auto;
padding:10px;
width:220px;
border:none;
border-radius:6px;
}

.login-panel button{
padding:10px 20px;
background:#00e5ff;
border:none;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

/* BOOT SCREEN */

#bootScreen{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:400px;
text-align:center;
color:#00ffff;
}

.progress-container{
width:100%;
height:25px;
background:#111;
border:2px solid cyan;
border-radius:6px;
overflow:hidden;
margin-top:20px;
}

#progressBar{
width:0%;
height:100%;
background:linear-gradient(90deg,#00ffff,#00ffaa);
transition:width 1s linear;
}

/* TERMINAL */

#terminal{
position:absolute;
top:10%;
left:10%;
width:80%;
height:80%;
background:#000;
border:2px solid cyan;
padding:20px;
overflow-y:auto;
white-space:pre-line;
font-family:"Consolas",monospace;
font-size:14px;
box-shadow:0 0 20px cyan;
}

.doc-buttons{
margin-top:20px;
}

.doc-buttons button{
margin:5px;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
background:#00e5ff;
color:black;
}

</style>
</head>

<body>

<div class="background"></div>

<!-- LOGIN -->

<div class="login-panel">
<h1>REELMIND CORP</h1>
<h2>FurrArmy Command Terminal</h2>

<input id="user" placeholder="Operator ID">
<input type="password" id="pass" placeholder="Access Key">

<button onclick="login()">ACCESS TERMINAL</button>

<p id="status"></p>
</div>

<!-- BOOT -->

<div id="bootScreen" class="hidden">

<h2>Initializing FurrArmy Command Systems</h2>

<div class="progress-container">
<div id="progressBar"></div>
</div>

<p id="bootText">Starting boot sequence...</p>

</div>

<!-- TERMINAL -->

<div id="terminal" class="hidden">

<h2>Command Terminal</h2>

<pre id="output"></pre>

<div id="docButtons" class="doc-buttons hidden">

<button onclick="showDocument('doc1')">Document 1: CODE GREEN</button>
<button onclick="showDocument('doc2')">Document 2: CODE ORANGE</button>
<button onclick="showDocument('doc3')">Document 3: CODE YELLOW</button>
<button onclick="showDocument('doc4')">Document 4: CODE RED</button>
<button onclick="showDocument('doc5')">Document 5: CODE BLACK</button>
<button onclick="showDocument('doc6')">Document 6: PROTOCOL WARHEAD</button>

</div>

</div>

<script>

/* DOCUMENT DATABASE */

const documents = {

doc1:`🟢 CODE GREEN
Normal Operation Status

Full operational stability.
All divisions functioning normally.`,

doc2:`🟠 CODE ORANGE
Investigation Status

Suspicious activity detected.
FAIA investigation active.`,

doc3:`🟡 CODE YELLOW
Elevated Readiness

Forces preparing for possible engagement.`,

doc4:`🔴 CODE RED
Active Threat

All combat divisions mobilized.`,

doc5:`⚫ CODE BLACK
Critical Compromise

Containment failure risk.`,

doc6:`☢ PROTOCOL WARHEAD

Strategic last-resort response.

"If We Fall — We Fall On Our Terms."`

};


/* LOGIN */

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user==="admin" && pass==="reelmind"){

document.querySelector(".login-panel").style.display="none";

document.getElementById("bootScreen").classList.remove("hidden");

startBoot();

}else{

document.getElementById("status").innerText="ACCESS DENIED";

}

}


/* BOOT SEQUENCE */

function startBoot(){

let progress=0;
let bar=document.getElementById("progressBar");
let text=document.getElementById("bootText");

let messages=[
"Connecting to Reelmind Servers...",
"Initializing Security Protocols...",
"Loading FurrArmy Divisions...",
"Checking FAIA Intelligence Network...",
"Starting Command Terminal..."
];

let messageIndex=0;

let interval=setInterval(()=>{

progress+=1;

bar.style.width=progress+"%";

if(progress%20===0 && messageIndex<messages.length){

text.innerText=messages[messageIndex];
messageIndex++;

}

if(progress>=100){

clearInterval(interval);

document.getElementById("bootScreen").style.display="none";

document.getElementById("terminal").classList.remove("hidden");

boot();

}

},600);

}


/* TERMINAL BOOT */

function boot(){

let lines=[

"Connecting to Reelmind Servers...",
"Authenticating Operator...",
"Loading FurrArmy Systems...",
"Initializing Command Terminal...",
"Access Granted."

];

let output=document.getElementById("output");

let i=0;

let interval=setInterval(()=>{

output.innerHTML+=lines[i]+"\n";

i++;

if(i>=lines.length){

clearInterval(interval);

document.getElementById("docButtons").classList.remove("hidden");

}

},700);

}


/* DOCUMENT VIEW */

function showDocument(doc){

document.getElementById("output").innerText=documents[doc];

}

</script>

</body>
</html>
